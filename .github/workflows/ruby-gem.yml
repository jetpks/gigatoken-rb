---
name: Ruby Gem

# Dispatch-only: this fork cuts no releases and pushes nothing to RubyGems.
# This workflow exists to produce downloadable native-gem artifacts on demand.
on:
  workflow_dispatch:

jobs:
  cross-gem:
    name: Build native gem for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arm64-darwin
          - x86_64-linux
          - aarch64-linux
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Cross-compile native gem
        uses: oxidize-rb/actions/cross-gem@v1
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.3,3.4,4.0"
          # The dock images pin RUSTUP_DEFAULT_TOOLCHAIN=stable but honor
          # rust-toolchain.toml via rustup's first-invocation auto-install,
          # which also provisions the cross-target std libs declared in its
          # `targets` list. Don't reach for the action's `pre-script` input:
          # it's dead plumbing (undeclared at v1.4.4, and no released
          # rb-sys-dock reads INPUT_PRE_SCRIPT), so it never runs.

      - uses: actions/upload-artifact@v4
        with:
          name: cross-gem-${{ matrix.platform }}
          path: pkg/*.gem

  source-gem:
    name: Build source gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Build gem
        run: bundle exec rake build

      - uses: actions/upload-artifact@v4
        with:
          name: source-gem
          path: pkg/*.gem
