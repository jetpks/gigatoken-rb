---
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  cross-gem:
    name: Build native gem for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arm64-darwin
          - x86_64-linux
          - aarch64-linux
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Cross-compile native gem
        uses: oxidize-rb/actions/cross-gem@v1
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.3,3.4,4.0"
          # The dock images pin RUSTUP_DEFAULT_TOOLCHAIN=stable but honor
          # rust-toolchain.toml via rustup's first-invocation auto-install,
          # which also provisions the cross-target std libs declared in its
          # `targets` list. Don't reach for the action's `pre-script` input:
          # it's dead plumbing (undeclared at v1.4.4, and no released
          # rb-sys-dock reads INPUT_PRE_SCRIPT), so it never runs.

      - uses: actions/upload-artifact@v4
        with:
          name: cross-gem-${{ matrix.platform }}
          path: pkg/*.gem

  source-gem:
    name: Build source gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Build gem
        run: bundle exec rake build

      - uses: actions/upload-artifact@v4
        with:
          name: source-gem
          path: pkg/*.gem

  release:
    name: Publish to RubyGems
    needs:
      - cross-gem
      - source-gem
    runs-on: ubuntu-latest
    # Skip publishing on workflow_dispatch; tag pushes are the canonical
    # release trigger. Use `workflow_dispatch` to dry-run the build matrix.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - uses: actions/download-artifact@v4
        with:
          path: pkg
          merge-multiple: true

      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@v2.1.0

      - name: Push gems to RubyGems
        run: |
          set -e
          for gem in pkg/*.gem; do
            echo "Pushing $gem"
            gem push "$gem"
          done

      - name: Attach gems to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: pkg/*.gem
          generate_release_notes: true
